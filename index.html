<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Betinho — Agent Constellation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    background: #0A0E1A;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    color: #fff;
  }

  /* Title */
  .title {
    position: fixed;
    top: 20px;
    left: 0; right: 0;
    text-align: center;
    z-index: 20;
  }
  .title h1 {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 28px;
    color: #FFD700;
    text-shadow: 0 0 20px rgba(255,215,0,0.4);
    letter-spacing: 4px;
  }
  .title p {
    font-size: 11px;
    color: #556688;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .lang-flags {
    margin-top: 8px;
    display: flex;
    justify-content: center;
    gap: 12px;
  }
  .lang-flag {
    font-size: 20px;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.3s, transform 0.3s;
  }
  .lang-flag:hover { opacity: 0.8; transform: scale(1.2); }
  .lang-flag.active { opacity: 1; transform: scale(1.1); }

  /* Legend */
  .legend {
    position: fixed;
    bottom: 80px;
    left: 0; right: 0;
    z-index: 20;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 4px 20px;
    pointer-events: none;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-label {
    font-size: 10px;
    color: #667788;
    letter-spacing: 1px;
  }

  /* Canvas for particles and connections */
  #bgCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* SVG for graph */
  #graphSvg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    display: none;
  }

  /* Node labels */
  .node-group { cursor: pointer; }
  .node-circle {
    transition: r 0.3s, filter 0.3s;
  }
  .node-group:hover .node-circle {
    filter: brightness(1.5) drop-shadow(0 0 12px currentColor);
  }
  .node-label {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    fill: #AAB;
    font-size: 10px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .node-group:hover .node-label {
    opacity: 1;
  }
  .node-tagline {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    fill: #778;
    font-size: 8px;
    font-style: italic;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .node-group:hover .node-tagline {
    opacity: 1;
  }

  /* Connection lines */
  .link {
    stroke-opacity: 0.15;
    transition: stroke-opacity 0.3s;
  }

  /* Card overlay */
  .card-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(5,5,15,0);
    z-index: 50;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(0px);
    transition: background 0.5s, backdrop-filter 0.5s;
  }
  .card-overlay.active {
    display: flex;
    background: rgba(5,5,15,0.85);
    backdrop-filter: blur(8px);
  }


  /* Card inside overlay */
  /* Aspect ratio matches Front.png 327:538 */
  .card-scene {
    width: 380px;
    height: 625px;
    perspective: 1200px;
  }
  .card {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-face {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    border-radius: 14px;
    overflow: hidden;
  }

  /* Front */
  .card-front { background: #080C18; }
  .card-front::before {
    content: '';
    position: absolute;
    top: -3px; left: -3px; right: -3px; bottom: -3px;
    background: conic-gradient(from 0deg, #FFD700, #FF3900, #00D4FF, #FF3900, #FFD700);
    border-radius: 17px; z-index: -1;
    opacity: 0.4; filter: blur(10px);
    animation: glow 6s linear infinite;
  }
  @keyframes glow { 0%,100% { opacity: 0.3; } 50% { opacity: 0.6; } }

  .art-layer {
    position: absolute;
    top: 12.1%; left: 13.5%;
    width: 74%; height: 52.8%;
    overflow: hidden;
  }
  .art-layer img { width: 100%; height: 120%; object-fit: cover; object-position: center 15%; }
  .frame-layer {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; z-index: 2; pointer-events: none;
  }
  .frame-layer img { width: 100%; height: 100%; object-fit: fill; }

  .card-name-area {
    position: absolute; top: 4.5%;
    left: 0; right: 0; text-align: center; z-index: 3;
  }
  .card-name {
    font-family: 'Cinzel', serif; font-weight: 900; font-size: 22px;
    color: #FFD700;
    text-shadow: 0 0 12px rgba(255,215,0,0.6), 0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 2px;
  }
  .card-title-area {
    position: absolute; top: 66%;
    left: 0; right: 0; text-align: center; padding: 4px 20px; z-index: 3;
  }
  .card-title {
    font-family: 'Cinzel', serif; font-weight: 700; font-size: 14px;
    color: #FFFFFF; text-transform: uppercase; letter-spacing: 1.5px;
    text-shadow: 0 0 8px rgba(0,212,255,0.4), 0 1px 3px rgba(0,0,0,0.9);
  }
  .card-abilities-area {
    position: absolute; top: 73%; left: 0; right: 0; bottom: 7%;
    padding: 2px 14px 2px 52px;
    display: flex; flex-direction: column; justify-content: flex-start;
    gap: 3px; z-index: 3; overflow: hidden;
  }
  .card-tagline {
    font-style: italic; font-size: 9px; color: #9999CC;
    text-align: left; padding-bottom: 4px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  }
  .ability-name { font-weight: 700; font-size: 10px; color: #00D4FF; text-shadow: 0 0 6px rgba(0,212,255,0.3); }
  .ability-desc { font-size: 9.5px; color: #9999BB; line-height: 1.3; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
  .card-number-text {
    position: absolute; bottom: 5%; right: 8%;
    font-size: 13px; font-weight: 700; color: #8899BB;
    letter-spacing: 1px; z-index: 3; text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  }
  .card-set-text {
    position: absolute; bottom: 4%; left: 26%;
    font-size: 10px; color: #8899BB;
    letter-spacing: 1px; z-index: 3; text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  }

  /* Back */
  .card-back { transform: rotateY(180deg); }
  .card-back img {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; object-fit: cover; border-radius: 14px;
  }

  /* Shine */
  .shine {
    position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
    z-index: 10; pointer-events: none; transition: left 0.5s; border-radius: 14px;
  }
  .card-scene:hover .shine { left: 160%; }

  /* Close hint */
  .close-hint {
    position: fixed; top: 20px; right: 30px;
    color: rgba(255,255,255,0.3); font-size: 12px;
    letter-spacing: 2px; text-transform: uppercase; z-index: 60;
    display: none;
  }
  .card-overlay.active ~ .close-hint { display: block; }

  /* Bottom info */
  .bottom-info {
    position: fixed; bottom: 16px;
    left: 0; right: 0; text-align: center;
    z-index: 20; pointer-events: none;
  }
  .bottom-info span {
    font-size: 10px; color: #334; letter-spacing: 2px; text-transform: uppercase;
  }
</style>
</head>

function setLang(lang) {
  currentLang = lang;
  // Update flags
  document.querySelectorAll('.lang-flag').forEach(f => {
    f.classList.toggle('active', f.dataset.lang === lang);
  });
  // Update title and subtitle
  document.getElementById('mainTitle').textContent = i18n.mainTitle[lang];
  document.getElementById('subtitle').textContent = i18n.subtitle[lang];
  // Update bottom hint
  document.querySelector('.bottom-info span').textContent = i18n.clickHint[lang];
  // Update legend
  const legendLabels = document.querySelectorAll('.legend-label');
  const legendKeys = ['boss','orchestrator','consultation','compound','production','specialist','autonomous'];
  legendLabels.forEach((l, idx) => {
    l.textContent = i18n.legend[legendKeys[idx]][lang];
  });
}

// ============ FORCE SIMULATION ============
// Seed random for reproducibility
function seededRandom(seed) { let s = seed; return () => { s = (s * 16807 + 0) % 2147483647; return s / 2147483647; }; }
const rng = seededRandom(42);

// Place: Betinho center, JP above, others scattered naturally around Betinho
agents.forEach((a, i) => {
  if (a.id === 'betinho') {
    a.x = centerX; a.y = centerY;
  } else if (a.id === 'jp') {
    a.x = centerX; a.y = centerY - 280;
  } else {
    // Random angle with some jitter — natural feel
    const angle = rng() * Math.PI * 2;
    // Most in outer ring, a few closer to fill the gap
    const r = rng();
    const dist = r < 0.25 ? (90 + rng() * 50) : (170 + rng() * 70);
    a.x = centerX + Math.cos(angle) * dist;
    a.y = centerY + Math.sin(angle) * dist;
  }
  a.vx = 0; a.vy = 0;
});

// Force simulation — natural spread with overlap prevention
function simulate() {
  // Repulsion between all non-fixed nodes
  for (let i = 0; i < agents.length; i++) {
    if (agents[i].id === 'betinho' || agents[i].id === 'jp') continue;
    for (let j = i + 1; j < agents.length; j++) {
      if (agents[j].id === 'betinho' || agents[j].id === 'jp') continue;
      let dx = agents[j].x - agents[i].x;
      let dy = agents[j].y - agents[i].y;
      let d = Math.sqrt(dx * dx + dy * dy) || 1;
      let minDist = agents[i].radius + agents[j].radius + 60;
      if (d < minDist) {
        let push = (minDist - d) * 0.4;
        agents[i].x -= (dx / d) * push;
        agents[i].y -= (dy / d) * push;
        agents[j].x += (dx / d) * push;
        agents[j].y += (dy / d) * push;
      }
    }
  }

  // Pull agents toward Betinho (keep them in orbit, not flying away)
  agents.forEach(a => {
    if (a.id === 'betinho' || a.id === 'jp') return;
    let dx = centerX - a.x, dy = centerY - a.y;
    let d = Math.sqrt(dx * dx + dy * dy) || 1;
    let targetDist = 240;
    // Only pull back if too far
    let force = d > targetDist ? (d - targetDist) * 0.015 : 0;
    a.x += (dx / d) * force;
    a.y += (dy / d) * force;
  });

  // Also repel from JP and Betinho
  agents.forEach(a => {
    if (a.id === 'betinho' || a.id === 'jp') return;
    ['betinho', 'jp'].forEach(fixedId => {
      const f = agents.find(ag => ag.id === fixedId);
      let dx = a.x - f.x, dy = a.y - f.y;
      let d = Math.sqrt(dx * dx + dy * dy) || 1;
      let minD = f.radius + a.radius + 50;
      if (d < minD) {
        let push = (minD - d) * 0.5;
        a.x += (dx / d) * push;
        a.y += (dy / d) * push;
      }
    });
  });

  // Fix Betinho and JP
  const b = agents.find(a => a.id === 'betinho');
  b.x = centerX; b.y = centerY;
  const jp = agents.find(a => a.id === 'jp');
  jp.x = centerX; jp.y = centerY - 280;

  // Bounds
  agents.forEach(a => {
    a.x = Math.max(80, Math.min(W - 80, a.x));
    a.y = Math.max(90, Math.min(H - 60, a.y));
  });
}

for (let i = 0; i < 300; i++) simulate();
// Store positions as ratios (0-1) for responsiveness
agents.forEach(a => {
  a.rx = a.x / W;
  a.ry = a.y / H;
});

// Store offsets from center — reposition on resize keeping same distances
agents.forEach(a => {
  a.offX = a.x - centerX;
  a.offY = a.y - centerY;
});

function updatePositions() {
  agents.forEach(a => {
    a.x = W / 2 + a.offX;
    a.y = H / 2 + a.offY;
    a._screenX = a.x;
    a._screenY = a.y;
  });
}
updatePositions();

window.addEventListener('resize', () => {
  resize();
  updatePositions();
});

// ============ HOVER STATE ============
let hoveredAgent = null;
canvas.addEventListener('mousemove', (e) => {
  hoveredAgent = null;
  for (const a of agents) {
    const dx = e.clientX - a.x, dy = e.clientY - a.y;
    if (Math.sqrt(dx*dx + dy*dy) < a.radius + 15) {
      hoveredAgent = a;
      canvas.style.cursor = 'pointer';
      break;
    }
  }
  if (!hoveredAgent) canvas.style.cursor = 'default';
});

canvas.addEventListener('click', (e) => {
  if (hoveredAgent) openCard(hoveredAgent);
});

// ============ MAIN RENDER LOOP ============
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Stars — pulsating night sky
  const now = Date.now() * 0.001;
  stars.forEach(s => {
    const alpha = s.baseAlpha + Math.sin(now * s.speed * 1000 + s.phase) * s.baseAlpha * 0.6;
    ctx.beginPath();
    ctx.arc(s.rx * W, s.ry * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = Math.max(0.03, alpha);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Background particles
  particles.forEach(p => {
    if (!p.x) { p.x = p.rx * W; p.y = p.ry * H; }
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.alpha;
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  const t = Date.now() * 0.002;

  // Draw links
  links.forEach(l => {
    const a = agents[l.source], b = agents[l.target];
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    if (l.type === 'parent') {
      ctx.strokeStyle = a.id === 'jp' ? '#FFD700' : '#FF3900';
      ctx.lineWidth = a.id === 'jp' ? 2 : 1.2;
      ctx.globalAlpha = 0.4;
    } else {
      ctx.strokeStyle = '#00D4FF';
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.35;
      ctx.setLineDash([3, 5]);
    }
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
  });

  // Draw energy pulses traveling along wires
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    p.t += p.dir * p.speed;
    if (p.t > 1 || p.t < 0) { pulses.splice(i, 1); continue; }

    const a = agents[p.link.source], b = agents[p.link.target];
    const px = a.x + (b.x - a.x) * p.t;
    const py = a.y + (b.y - a.y) * p.t;

    // Glow trail
    const grad = ctx.createRadialGradient(px, py, 0, px, py, 12);
    grad.addColorStop(0, p.color);
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(px, py, 12, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.globalAlpha = p.alpha * 0.6;
    ctx.fill();

    // Core dot
    ctx.beginPath();
    ctx.arc(px, py, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = p.alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Draw nodes
  agents.forEach((a, i) => {
    const isHovered = hoveredAgent === a;
    const pulse = 1 + Math.sin(t + i * 0.5) * 0.12;
    const r = a.radius * pulse;

    // Outer glow
    const glow = ctx.createRadialGradient(a.x, a.y, r, a.x, a.y, r + (isHovered ? 25 : 10));
    glow.addColorStop(0, a.color);
    glow.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(a.x, a.y, r + (isHovered ? 25 : 10), 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.globalAlpha = isHovered ? 0.4 : 0.15;
    ctx.fill();

    // Main circle
    ctx.beginPath();
    ctx.arc(a.x, a.y, r, 0, Math.PI * 2);
    ctx.fillStyle = a.color;
    ctx.globalAlpha = isHovered ? 1 : 0.85;
    ctx.fill();

    // Inner highlight
    ctx.beginPath();
    ctx.arc(a.x - r * 0.2, a.y - r * 0.2, r * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.25;
    ctx.fill();
    ctx.globalAlpha = 1;

    // Labels — always visible for JP and Betinho, hover for others
    const showLabel = isHovered || a.id === 'jp' || a.id === 'betinho';
    if (showLabel) {
      // Name
      ctx.font = `bold ${isHovered ? 16 : 13}px Inter, sans-serif`;
      ctx.fillStyle = '#DDE';
      ctx.textAlign = 'center';
      ctx.globalAlpha = isHovered ? 1 : 0.7;
      ctx.fillText(a.name, a.x, a.y - r - 12);

      // Title — use current language
      const title = i18n.titles[a.id] ? i18n.titles[a.id][currentLang] : a.title;
      ctx.font = `italic ${isHovered ? 13 : 10}px Inter, sans-serif`;
      ctx.fillStyle = '#889';
      ctx.globalAlpha = isHovered ? 0.9 : 0.5;
      ctx.fillText(title, a.x, a.y + r + 18);
      ctx.globalAlpha = 1;
    }
  });

  requestAnimationFrame(draw);
}
draw();

// Hide SVG — using canvas now
document.getElementById('graphSvg').style.display = 'none';
// Set initial language
setLang('en');

// ============ CARD OVERLAY ============
const overlay = document.getElementById('cardOverlay');
const cardInner = document.getElementById('cardInner');

function openCard(agent) {
  const title = i18n.titles[agent.id] ? i18n.titles[agent.id][currentLang] : agent.title;
  const tagline = i18n.taglines[agent.id] ? i18n.taglines[agent.id][currentLang] : agent.tagline;

  document.getElementById('cardArtImg').src = agent.img;
  document.getElementById('cardNameText').textContent = agent.name;
  document.getElementById('cardTitleText').textContent = title;
  document.getElementById('cardNumberText').textContent = agent.number;

  const abArea = document.getElementById('cardAbilities');
  const abilities = i18n.abilities[agent.id] ? i18n.abilities[agent.id][currentLang] : agent.abilities;
  abArea.innerHTML = `<div class="card-tagline">${tagline}</div>`;
  abilities.forEach(ab => {
    abArea.innerHTML += `<div style="display:flex;gap:6px"><div><span class="ability-name">${ab.name}</span><span class="ability-desc"> ${ab.desc}</span></div></div>`;
  });

  const scene = document.getElementById('cardScene');
  // Calculate offset from agent's node position to screen center
  const ox = agent._screenX - W / 2;
  const oy = agent._screenY - H / 2;
  scene.style.transition = 'none';
  scene.style.transform = `translate(${ox}px, ${oy}px) scale(0) rotateY(720deg)`;
  overlay.classList.add('active');
  scene.offsetHeight;
  scene.style.transition = 'transform 1.2s cubic-bezier(0.22, 1, 0.36, 1)';
  scene.style.transform = 'translate(0, 0) scale(1) rotateY(0deg)';
  // Store current agent for close animation
  overlay._currentAgent = agent;
}

// Close overlay — click anywhere outside card
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) {
    const scene = document.getElementById('cardScene');
    const agent = overlay._currentAgent;
    const ox = agent ? agent._screenX - W / 2 : 0;
    const oy = agent ? agent._screenY - H / 2 : 0;
    scene.style.transition = 'transform 1s cubic-bezier(0.55, 0, 1, 0.45)';
    scene.style.transform = `translate(${ox}px, ${oy}px) scale(0) rotateY(-720deg)`;
    setTimeout(() => {
      overlay.classList.remove('active');
      scene.style.transition = 'none';
      scene.style.transform = '';
    }, 1000);
  }
});

// Close when clicking card itself
document.getElementById('cardScene').addEventListener('click', (e) => {
  e.stopPropagation();
  const scene = document.getElementById('cardScene');
  const agent = overlay._currentAgent;
  const ox = agent ? agent._screenX - W / 2 : 0;
  const oy = agent ? agent._screenY - H / 2 : 0;
  scene.style.transition = 'transform 1s cubic-bezier(0.55, 0, 1, 0.45)';
  scene.style.transform = `translate(${ox}px, ${oy}px) scale(0) rotateY(-720deg)`;
  setTimeout(() => {
    overlay.classList.remove('active');
    scene.style.transition = 'none';
    scene.style.transform = '';
  }, 1000);
});

// ESC to close
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const scene = document.getElementById('cardScene');
    const agent = overlay._currentAgent;
    const ox = agent ? agent._screenX - W / 2 : 0;
    const oy = agent ? agent._screenY - H / 2 : 0;
    scene.style.transition = 'transform 1s cubic-bezier(0.55, 0, 1, 0.45)';
    scene.style.transform = `translate(${ox}px, ${oy}px) scale(0) rotateY(-720deg)`;
    setTimeout(() => {
      overlay.classList.remove('active');
      scene.style.transition = 'none';
      scene.style.transform = '';
    }, 1000);
  }
});
</script>
